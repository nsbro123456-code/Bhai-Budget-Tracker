<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhai Budget Tracker v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bhai Budget Tracker</h1>
            <p>Master Your Money Like a Hero</p>
        </header>

        <div class="balance-container">
            <h2>Current Balance</h2>
            <h1 id="balance">Rs. 0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+Rs. 0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-Rs. 0.00</p>
            </div>
        </div>

        <h3>Transaction History</h3>
        <ul id="list" class="list">
            </ul>

        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Detail Name</label>
                <input type="text" id="text" placeholder="e.g. Biryani, Salary..." />
            </div>
            <div class="form-control">
                <label for="amount">Amount <br> (Negative = Expense, Positive = Income)</label>
                <input type="number" id="amount" placeholder="Enter amount..." />
            </div>
            <button type="submit" class="btn">Add Transaction</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
